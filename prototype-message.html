<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Site Under Construction</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f8f9fa;
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      .message-box {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        padding: 2.5rem 2rem;
        text-align: center;
        max-width: 420px;
      }
      .message-box h1 {
        font-size: 1.6rem;
        color: #2d3a4a;
        margin-bottom: 1.2rem;
      }
      .message-box p {
        font-size: 1.1rem;
        color: #4a5568;
      }
    </style>
  </head>
  <body>
    <div class="message-box">
      <h1>Sorry, this website is currently a prototype</h1>
      <p>and is a work in progress. Thank you for your patience.</p>
    </div>
  </body>
</html>
